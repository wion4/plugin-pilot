name: Bug Report
description: Report a bug or unexpected behavior in Plugin Pilot
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Run `/plugin-pilot:pilot scan`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or relevant output
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15.2, Ubuntu 24.04, SteamOS 3.6
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      placeholder: e.g. 1.0.16
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Pilot version
      placeholder: e.g. 0.1.0

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (installed plugins, project type, etc.)
