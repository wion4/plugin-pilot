name: Feature Request
description: Suggest an idea or improvement for Plugin Pilot
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Plugin Pilot better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why do you need it?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried?

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Plugin detection / recommendations
        - Stack discovery
        - Skill management
        - Cleanup / removal
        - Catalog / marketplace
        - GitHub community search
        - Plan mode integration
        - UI / output formatting
        - Performance / token usage
        - Legal / consent
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, links, etc.
